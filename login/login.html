<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DigiLib Universitas Bengkulu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blue: { 500: '#3b82f6', 600: '#2563eb' },
                        slate: { 800: '#1e293b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white min-h-screen flex font-sans overflow-hidden">

    <div class="hidden lg:flex lg:w-1/2 bg-[#0a1128] flex-col justify-center items-center relative p-12 overflow-hidden">
        <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 32px 32px;"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[30rem] h-[30rem] bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20"></div>

        <div class="relative z-10 text-center flex flex-col items-center">
            <div class="flex items-center gap-5 mb-4">
                <div class="w-20 h-20 bg-blue-600 rounded-[1.25rem] flex items-center justify-center shadow-2xl shadow-blue-600/50">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                </div>
                <h1 class="text-6xl font-extrabold text-white tracking-tight">DigiLib.</h1>
            </div>

            <p class="text-2xl text-slate-300 font-medium tracking-wide mb-6">Perpustakaan Digital</p>
            
            <div class="px-6 py-2 bg-blue-500/10 border border-blue-400/30 rounded-full backdrop-blur-md">
                <span class="text-blue-400 font-bold tracking-widest uppercase text-sm">Universitas Bengkulu</span>
            </div>
        </div>
    </div>

    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 md:p-20 bg-white">
        <div class="w-full max-w-md">
            <div class="mb-10">
                <div class="lg:hidden flex items-center justify-center gap-3 mb-8">
                    <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    </div>
                    <span class="text-3xl font-extrabold text-slate-800 tracking-tight">DigiLib.</span>
                </div>

                <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Selamat Datang!</h2>
                <p class="text-base text-slate-600">Silakan login untuk mengakses akun DigiLib Anda.</p>
            </div>

            <form id="formLogin" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-bold text-slate-700 mb-2">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input type="email" id="email" name="email" required placeholder="Email@"
                            class="w-full pl-12 pr-4 py-3.5 bg-[#eff4fa] border border-[#e2e8f0] text-slate-800 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-all font-medium placeholder:text-slate-400">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input type="password" id="password" name="password" required placeholder="••••••••"
                            class="w-full pl-12 pr-12 py-3.5 bg-[#eff4fa] border border-[#e2e8f0] text-slate-800 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-all font-medium placeholder:text-slate-400">
                        
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-slate-400 hover:text-slate-600" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password';">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-[#0f172a] hover:bg-[#1e293b] text-white font-bold py-3.5 px-4 rounded-lg shadow-md transition-all hover:-translate-y-0.5">
                        Masuk
                    </button>
                </div>
            </form>

            <div class="mt-8 flex flex-col items-center gap-6">
                <a href="#" onclick="Swal.fire({
                    title: 'Butuh Bantuan?',
                    text: 'Silakan temui Admin di Ruang Tata Usaha atau hubungi staf IT Universitas Bengkulu untuk mereset password akun Anda.',
                    icon: 'info',
                    confirmButtonText: 'Mengerti',
                    confirmButtonColor: '#2563eb'
                }); return false;" class="text-sm font-semibold text-slate-600 hover:text-slate-900 transition-colors">Butuh Bantuan?</a>
                
                <p class="text-sm text-slate-500">Belum punya akun? <a href="register.html" class="font-bold text-blue-600 hover:text-blue-800 transition-colors">Daftar sekarang</a></p>
            </div>
            
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault(); 

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('api_login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                
                const res = await response.json();

                if (res.status === 'success') {
                    localStorage.setItem('user_role', res.data.role);
                    localStorage.setItem('user_nama', res.data.nama); 
                    localStorage.setItem('user_id', res.data.id);

                    Swal.fire({
                        title: 'Berhasil!',
                        text: 'Selamat datang, ' + res.data.nama,
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        if (res.data.role === 'admin') {
                            window.location.href = '../admin/admin.html'; 
                        } else {
                            window.location.href = '../user/user.html'; 
                        }
                    });
                } else {
                    Swal.fire({
                        title: 'Akses Ditolak',
                        text: res.message,
                        icon: 'error',
                        confirmButtonColor: '#0f172a'
                    });
                }
            } catch (error) {
                Swal.fire({
                    title: 'Error Sistem',
                    text: 'Terjadi kesalahan saat menghubungi server.',
                    icon: 'error',
                    confirmButtonColor: '#0f172a'
                });
                console.error(error);
            }
        });
    </script>

</body>
</html>
