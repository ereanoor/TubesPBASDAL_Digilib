<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiLib - Portal Anggota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-900">

    <nav class="bg-blue-700 text-white shadow-lg p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                <span class="text-2xl font-bold tracking-tighter">DigiLib</span>
            </div>
            
            <div class="hidden md:flex flex-1 mx-10 gap-2">
                <select id="filterKategori" onchange="app.searchBuku()" class="p-2 rounded-lg text-gray-800 outline-none cursor-pointer border-r border-gray-200">
                    <option value="">Semua Kategori</option>
                    <option value="fiksi">Fiksi</option>
                    <option value="non fiksi">Non Fiksi</option>
                    <option value="horor">Horor</option>
                    <option value="romance">Romance</option>
                    <option value="fantasi">Fantasi</option>
                    <option value="komik">Komik</option>
                </select>
                <input type="text" id="searchInput" onkeyup="app.searchBuku()" placeholder="Cari judul atau penulis..." class="w-full p-2 rounded-lg text-gray-800 outline-none">
            </div>

            <div class="flex items-center space-x-6 font-medium">
                <button onclick="app.showSection('katalog')" class="hover:text-blue-200">Katalog</button>
                <button onclick="app.showSection('profil')" class="hover:text-blue-200">Riwayat</button>
                <button onclick="app.logout()" class="bg-red-500 px-4 py-1 rounded-md hover:bg-red-600 shadow-md transition">Logout</button>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b p-4 mb-6">
        <div class="container mx-auto flex items-center justify-between">
            <h2 id="welcomeText" class="text-xl font-semibold text-gray-700 italic">Selamat Datang</h2>
            <p class="text-xs text-gray-400">Universitas Bengkulu</p>
        </div>
    </div>

    <main class="container mx-auto px-4 pb-20">
        <section id="katalogSection">
            <h3 class="text-2xl font-bold text-gray-800 border-l-4 border-blue-700 pl-3 mb-6">E-Katalog Literatur</h3>
            <div id="katalog-buku" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="profilSection" class="hidden">
            <h3 class="text-2xl font-bold text-gray-800 mb-6 border-l-4 border-green-600 pl-3">Rak Buku Virtual & Riwayat</h3>
            <div class="bg-white rounded-xl shadow-md overflow-hidden overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-100">
                        <tr class="text-sm">
                            <th class="p-4 border-b">Buku</th>
                            <th class="p-4 border-b">Pinjam</th>
                            <th class="p-4 border-b">Kembali</th>
                            <th class="p-4 border-b">Status</th>
                            <th class="p-4 border-b">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="riwayatTable" class="text-sm"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js?v=2"></script>
</body>
</html>
